# Channel and Simulation Parameters
num_symbols: 100
snr_db: 20.0
noise_var: null 
modulation: 'BPSK'
dp_alpha: 1.0
kernel_type: 'RBF'
delay_range: [0, 10]

# SMC (Particle Filter) Parameters
smc:
  num_particles: 100
  resample_method: 'systematic' # Options: 'systematic', 'multinomial', 'stratified'

# Experiment Sweep Parameters
pilot_fracs: [0.0, 0.05, 0.1, 0.2, 0.4]
particle_list: [10, 25, 50, 100, 200, 400]

# Logging Configuration
logging:
  use_csv: true
  save_dir: "logs"
  use_wandb: false
  project_name: "bayesian-equalizer"
  run_name: "default-run"

# Plotting Configuration
plotting:
  save_figures: true
  figure_dir: "figures"
  delay_bins: 50
